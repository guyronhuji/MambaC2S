# Transformer model configuration
# Inherits from base.yaml

model:
  type: "transformer"
  d_model: 128
  n_layers: 3
  nhead: 4
  dropout: 0.1
  max_seq_len: 128
  dim_feedforward: 512  # 4 * d_model

training:
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 1.0e-4
  max_epochs: 100
  patience: 10
  grad_clip: 1.0
  mixed_precision: false
